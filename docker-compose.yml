services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: discogs
      POSTGRES_PASSWORD: discogs
      POSTGRES_DB: discogs_listen_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://discogs:discogs@db:5432/discogs_listen_tracker?sslmode=disable
    command: ["sh", "-c", "migrate up && api"]
    ports:
      - "8080:8080"
    depends_on:
      - db

  ui:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:

