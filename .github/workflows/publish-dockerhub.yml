name: Build & Push Docker Images (Docker Hub)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: publish-dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & push multi-platform images (API + UI)
        uses: depot/bake-action@v1
        with:
          files: docker-bake.hcl
          push: true
          provenance: false
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          TAG: ${{ github.sha }}
          PUSH_LATEST: "true"

      - name: Checkout config manifests
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vinyl-spins-config
          path: config-repo
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - name: Configure Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail

          # Find the deployment manifest in the config repo.
          MANIFEST=""
          for p in \
            "config-repo/config/deployment.yaml" \
            "config-repo/k8s/deployment.yaml" \
            "config-repo/deployment.yaml"
          do
            if [ -f "$p" ]; then
              MANIFEST="$p"
              break
            fi
          done

          if [ -z "$MANIFEST" ]; then
            echo "ERROR: could not find deployment manifest in config repo."
            echo "Looked for:"
            echo "  - config/deployment.yaml"
            echo "  - k8s/deployment.yaml"
            echo "  - deployment.yaml"
            echo
            echo "Repo tree:"
            ls -la config-repo || true
            exit 1
          fi

          echo "Updating manifest: $MANIFEST"
          sed -i \
            -e "s|DOCKER_URL|${{ secrets.DOCKER_URL }}|g" \
            -e "s|IMAGE_LABEL|${{ github.sha }}|g" \
            -e "s|ALLOW_EMAIL|${{ secrets.ALLOW_EMAIL }}|g" \
            -e "s|APP_URL|${{ vars.APP_URL }}|g" \
            "$MANIFEST"

      - name: Commit and push updated manifests (render_prod)
        shell: bash
        working-directory: config-repo
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No manifest changes detected; skipping commit."
            exit 0
          fi

          git add -A
          git -c user.name="GitHub Actions" -c user.email="actions@github.com" \
            commit -m "Update vinyl-spins manifests to ref: ${{ github.sha }}"

          git push origin HEAD:render_prod --force

