name: Build & Push Docker Images (Docker Hub)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: publish-dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Depot
        uses: depot/setup-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & push API image
        uses: depot/build-push-action@v1
        with:
          context: .
          file: backend/Dockerfile
          project: ln4tfk4zrt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/vst-api:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/vst-api:latest
          build-args: |
            DEMO_BIG=0

      - name: Build & push UI (prod) image
        uses: depot/build-push-action@v1
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          project: ln4tfk4zrt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/vst-ui:${{ github.sha }}
            ${{ secrets.DOCKER_USER }}/vst-ui:latest
          build-args: |
            DEMO_BIG=0

      - name: Checkout config manifests
        uses: actions/checkout@v4
        with:
          repository: scott-depot-demos/vinyl-spins-config
          path: config-repo
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - name: Configure Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail

          # Find the deployment manifest in the config repo.
          MANIFEST=""
          for p in \
            "config-repo/config/deployment.yaml" \
            "config-repo/k8s/deployment.yaml" \
            "config-repo/deployment.yaml"
          do
            if [ -f "$p" ]; then
              MANIFEST="$p"
              break
            fi
          done

          if [ -z "$MANIFEST" ]; then
            echo "ERROR: could not find deployment manifest in config repo."
            echo "Looked for:"
            echo "  - config/deployment.yaml"
            echo "  - k8s/deployment.yaml"
            echo "  - deployment.yaml"
            echo
            echo "Repo tree:"
            ls -la config-repo || true
            exit 1
          fi

          echo "Updating manifest: $MANIFEST"
          sed -i \
            -e "s|DOCKER_URL|${{ secrets.DOCKER_URL }}|g" \
            -e "s|IMAGE_LABEL|${{ github.sha }}|g" \
            "$MANIFEST"

      - name: Commit and push updated manifests (render_prod)
        shell: bash
        working-directory: config-repo
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No manifest changes detected; skipping commit."
            exit 0
          fi

          git add -A
          git -c user.name="GitHub Actions" -c user.email="actions@github.com" \
            commit -m "Update vinyl-spins manifests to ref: ${{ github.sha }}"

          git push origin HEAD:render_prod --force

