name: Build & Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & publish multi-platform images (API + UI)
        uses: depot/bake-action@v1
        with:
          token: ${{ secrets.DEPOT_PROJ_TOKEN }}
          project: ${{ secrets.DEPOT_PROJECT }}
          files: docker-bake.hcl
          push: true
          provenance: false
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          TAG: ${{ github.sha }}
          PUSH_LATEST: "false"

      - name: Checkout config manifests
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vinyl-spins-config
          path: config-repo
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false

      - name: Configure Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail

          # Update known manifest files in the config repo (API/UI/Ingress).
          UPDATED=0
          for p in \
            "config-repo/config/30-api.yaml" \
            "config-repo/config/40-ui.yaml" \
            "config-repo/config/50-ingress-ngrok-oauth.yaml"
          do
            if [ -f "$p" ]; then
              echo "Updating manifest: $p"
              sed -i \
                -e "s|DOCKER_URL|${{ secrets.DOCKER_URL }}|g" \
                -e "s|IMAGE_LABEL|${{ github.sha }}|g" \
                -e "s|ALLOW_EMAIL|${{ secrets.ALLOW_EMAIL }}|g" \
                -e "s|APP_URL|${{ vars.APP_URL }}|g" \
                "$p"
              UPDATED=1
            fi
          done

          if [ "$UPDATED" -eq 0 ]; then
            echo "ERROR: could not find deployment manifest in config repo."
            echo "Looked for:"
            echo "  - config/30-api.yaml"
            echo "  - config/40-ui.yaml"
            echo "  - config/50-ingress-ngrok-oauth.yaml"
            echo
            echo "Repo tree:"
            ls -la config-repo || true
            exit 1
          fi

      - name: Commit and push updated manifests (render_prod)
        shell: bash
        working-directory: config-repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          : "${GH_TOKEN:?Missing secrets.GH_TOKEN. Create a PAT (or GitHub App token) with write access to ${GITHUB_REPOSITORY_OWNER}/vinyl-spins-config and store it as GH_TOKEN.}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/vinyl-spins-config.git"

          if git diff --quiet; then
            echo "No manifest changes detected; skipping commit."
            exit 0
          fi

          git add -A
          git -c user.name="GitHub Actions" -c user.email="actions@github.com" \
            commit -m "Update vinyl-spins manifests to ref: ${{ github.sha }}"

          git push origin HEAD:render_prod --force

