name: Demo Heavy Build (slow on purpose)

on:
  workflow_dispatch:
    inputs:
      demo_big_n_go:
        description: "Go demobig size (entries)"
        required: false
        default: "20000"
      demo_big_n_ts:
        description: "TS demobig size (entries)"
        required: false
        default: "60000"

jobs:
  backend:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Generate big Go file
        working-directory: backend
        run: |
          DEMO_BIG_N="${{ inputs.demo_big_n_go }}" go run ./tools/demobiggen -out internal/demobig/generated.go

      - name: Build all binaries (demo)
        working-directory: backend
        run: |
          go build ./cmd/api
          go build ./cmd/migrate
          go build ./cmd/worker
          go build ./cmd/report

      - name: Run tests (demo)
        working-directory: backend
        run: |
          go test ./...

  frontend:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.0 --activate

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Generate big TS file
        working-directory: frontend
        run: |
          DEMO_BIG_N="${{ inputs.demo_big_n_ts }}" pnpm demobig:gen

      - name: Lint + build (demo)
        working-directory: frontend
        env:
          DEMO_BIG: "1"
        run: |
          pnpm lint
          pnpm build

  docker-images:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (demo big)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          build-args: |
            DEMO_BIG=1
            DEMO_BIG_N=${{ inputs.demo_big_n_go }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI prod image (demo big)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: false
          build-args: |
            DEMO_BIG=1
            DEMO_BIG_N=${{ inputs.demo_big_n_ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

