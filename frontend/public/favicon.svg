<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Record body -->
  <circle cx="50" cy="50" r="48" fill="#18181b"/>
  <!-- Groove rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#27272a" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#27272a" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="#27272a" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#27272a" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#27272a" stroke-width="1.2"/>
  <!-- Label -->
  <circle cx="50" cy="50" r="22" fill="#e63946"/>
  <!-- Label highlight -->
  <circle cx="50" cy="50" r="22" fill="url(#lg)" opacity="0.3"/>
  <!-- Center hole -->
  <circle cx="50" cy="50" r="4" fill="#18181b"/>
  <defs>
    <radialGradient id="lg" cx="35%" cy="35%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
